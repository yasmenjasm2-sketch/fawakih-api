<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Senpa.io - Ultimate Multi-Box Edition | ريماس التيم</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a1a;
            color: white;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: fixed;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        .tabs-container {
            display: flex;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 2px solid rgba(102, 126, 234, 0.6);
            height: 45px;
            align-items: center;
            padding: 0 10px;
            gap: 5px;
            z-index: 1000;
            position: relative;
        }

        .tab {
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            transition: all 0.3s ease;
            color: #999;
            white-space: nowrap;
            min-width: 110px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .tab.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-color: transparent;
            color: white;
            box-shadow: 0 0 25px rgba(102, 126, 234, 0.6);
            transform: translateY(-2px);
        }

        .tab:hover:not(.active) {
            background: rgba(102, 126, 234, 0.3);
            border-color: #667eea;
            color: white;
        }

        .tab-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ade80;
            box-shadow: 0 0 10px #4ade80;
            transition: all 0.3s;
        }

        .tab-dot.idle {
            background: #6366f1;
            box-shadow: 0 0 10px #6366f1;
        }

        .games-wrapper {
            position: relative;
            height: calc(100vh - 45px);
            width: 100%;
            overflow: hidden;
        }

        /* تقنية GPU للتبديل */
        .game-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            will-change: transform, opacity;
            transform: translateZ(0);
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            transition: opacity 0.2s ease;
        }

        .game-layer.active {
            visibility: visible;
            opacity: 1 !important;
            z-index: 2;
        }

        .game-layer.inactive {
            visibility: visible;
            opacity: 0.001 !important;
            z-index: 1;
            pointer-events: none;
        }

        /* وضع النافذة المصغرة للملتي (PiP) */
        .game-layer.inactive.pip-mode {
            opacity: 0.95 !important;
            z-index: 9998;
            width: 320px;
            height: 200px;
            top: auto;
            bottom: 20px;
            left: 20px;
            border: 3px solid #667eea;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            pointer-events: none; /* لتمرير النقرات للعبة الأساسية */
            transform: scale(1);
        }

        .fps-counter {
            position: fixed;
            top: 55px;
            left: 20px;
            background: rgba(0, 0, 0, 0.85);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            color: #4ade80;
            z-index: 9999;
            border: 1px solid rgba(74, 222, 128, 0.3);
            backdrop-filter: blur(10px);
            font-family: 'Courier New', monospace;
            transition: all 0.3s;
        }

        .fps-counter.pip-active {
            top: 235px; /* النزول تحت نافذة الملتي إذا كانت مفعلة */
        }

        .panel-toggle-btn {
            position: fixed;
            top: 55px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10000;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
            font-size: 16px;
        }

        .panel-toggle-btn:hover {
            transform: scale(1.1);
        }

        .control-panel {
            position: fixed;
            top: 105px;
            right: 20px;
            background: rgba(10, 10, 25, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            min-width: 260px;
            z-index: 9999;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: top right;
        }

        .panel-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0;
            padding: 10px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            font-size: 12px;
            font-weight: bold;
        }

        .btn {
            padding: 6px 15px;
            border: none;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 11px;
            text-transform: uppercase;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:hover {
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.5);
        }

        .btn-instagram {
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            color: white;
            margin-top: 15px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        .toggle-switch {
            position: relative;
            width: 42px;
            height: 22px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
        }

        .toggle-switch.active {
            background: #4ade80;
            box-shadow: 0 0 10px rgba(74, 222, 128, 0.4);
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: 0.3s;
        }

        .toggle-switch.active::after {
            left: 22px;
        }

        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(102, 126, 234, 0.95);
            color: white;
            padding: 10px 25px;
            border-radius: 25px;
            font-size: 13px;
            font-weight: bold;
            z-index: 10000;
            animation: toastAnim 2s ease forwards;
            pointer-events: none;
        }

        @keyframes toastAnim {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
        }

        .shortcut-hint {
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 12px;
            color: #ddd;
            z-index: 9999;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            white-space: nowrap;
        }

        .shortcut-hint strong {
            color: #4ade80;
            margin: 0 3px;
        }

        .hidden {
            display: none !important;
        }

        .ig-svg { width: 16px; height: 16px; fill: white; }
        
        .perf-indicator {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            margin-right: 5px;
        }
        .perf-good { background: #4ade80; box-shadow: 0 0 8px #4ade80; }
        .perf-medium { background: #fbbf24; box-shadow: 0 0 8px #fbbf24; }
        .perf-bad { background: #ef4444; box-shadow: 0 0 8px #ef4444; }
    </style>
</head>
<body>

    <div class="fps-counter" id="fpsCounter">
        <span class="perf-indicator perf-good" id="perfIndicator"></span>
        FPS: <span id="fpsValue">60</span>
    </div>

    <div class="panel-toggle-btn" id="panelToggleBtn" onclick="toggleControlPanel()">⚙️</div>

    <div class="tabs-container" id="tabsContainer">
        <div class="tab active" data-tab="0" onclick="switchToTab(0)">
            <span class="tab-dot" id="dot0"></span>
            الأساسي ①
        </div>
        <div class="tab" data-tab="1" onclick="switchToTab(1)">
            <span class="tab-dot idle" id="dot1"></span>
            الملتي ②
        </div>
    </div>

    <div class="games-wrapper" id="gamesWrapper">
        <iframe class="game-layer active" id="game0" 
                src="https://senpa.io" 
                allow="camera;microphone;autoplay;cross-origin-isolated"
                loading="eager"
                importance="high">
        </iframe>
        <iframe class="game-layer inactive" id="game1" 
                src="about:blank" 
                allow="camera;microphone;autoplay;cross-origin-isolated"
                loading="lazy">
        </iframe>
    </div>

    <div class="control-panel" id="controlPanel">
        <div class="panel-title">⚡ ريماس التيم - إعدادات الملتي</div>
        
        <div class="setting-row">
            <span>🔄 التبديل</span>
            <button class="btn btn-primary" id="keyBindBtn" onclick="startRebind('switch')">Tab</button>
        </div>

        <div class="setting-row">
            <span>🎯 استدعاء الملتي</span>
            <button class="btn btn-primary" id="summonBindBtn" onclick="startRebind('summon')">E</button>
        </div>

        <div class="setting-row">
            <span>📺 شاشة الملتي (PiP)</span>
            <div class="toggle-switch" id="pipToggle" onclick="togglePiP()"></div>
        </div>

        <div class="setting-row">
            <span>🔒 تثبيت الشاشة</span>
            <div class="toggle-switch active" id="lockToggle" onclick="toggleLock()"></div>
        </div>

        <div class="setting-row">
            <span>👤 إخفاء ID</span>
            <div class="toggle-switch active" id="idToggle" onclick="toggleHideId()"></div>
        </div>

        <button class="btn btn-instagram" id="igBtn" onclick="openIG()">
            <svg class="ig-svg" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>
            </svg>
            إخفاء / إظهار الانستقرام
        </button>
    </div>

    <div class="shortcut-hint">
        بدّل بـ <strong id="hintSwitch">Tab</strong> | استدعاء: <strong id="hintSummon">E</strong> | انقسام الملتي: <strong>R</strong> | إطعام الملتي: <strong>T</strong>
    </div>

    <script>
        (function() {
            'use strict';

            const CONFIG = {
                gameURL: 'https://senpa.io',
                igURL: 'https://www.instagram.com/6i99n?igsh=MW1wMTNpamJpMWNxeg==',
                switchKey: localStorage.getItem('remas_key_switch') || 'Tab',
                summonKey: localStorage.getItem('remas_key_summon') || 'KeyE',
                splitKey: 'KeyR',  // مفتاح انقسام الملتي
                feedKey: 'KeyT',   // مفتاح إطعام الملتي
                keepAliveInterval: 1000,
            };

            const STATE = {
                activeTab: 0,
                rebinding: false,
                rebindTarget: null,
                panelVisible: true,
                lockScreen: JSON.parse(localStorage.getItem('remas_lock') ?? 'true'),
                hideId: JSON.parse(localStorage.getItem('remas_hide') ?? 'true'),
                pipMode: JSON.parse(localStorage.getItem('remas_pip') ?? 'false'),
                tabs: [
                    { loaded: true, url: CONFIG.gameURL },
                    { loaded: false, url: CONFIG.gameURL }
                ],
                fps: 60,
                mouseX: window.innerWidth / 2,
                mouseY: window.innerHeight / 2
            };

            // تتبع الماوس في الشاشة الأساسية للاستدعاء الدقيق
            window.addEventListener('mousemove', (e) => {
                STATE.mouseX = e.clientX;
                STATE.mouseY = e.clientY;
            });

            // ============ نظام إخفاء اللوحة والانستقرام ============
            window.toggleControlPanel = function() {
                STATE.panelVisible = !STATE.panelVisible;
                document.getElementById('controlPanel')?.classList.toggle('hidden', !STATE.panelVisible);
                document.getElementById('panelToggleBtn').textContent = STATE.panelVisible ? '⚙️' : '🛠️';
            };

            window.openIG = function() { window.open(CONFIG.igURL, '_blank'); };

            // ============ نظام PiP (النافذة المصغرة للملتي) ============
            window.togglePiP = function() {
                STATE.pipMode = !STATE.pipMode;
                localStorage.setItem('remas_pip', JSON.stringify(STATE.pipMode));
                document.getElementById('pipToggle')?.classList.toggle('active', STATE.pipMode);
                
                const inactiveFrame = document.getElementById(`game${STATE.activeTab === 0 ? 1 : 0}`);
                if (inactiveFrame) {
                    inactiveFrame.classList.toggle('pip-mode', STATE.pipMode);
                }
                document.getElementById('fpsCounter')?.classList.toggle('pip-active', STATE.pipMode);
                toast(STATE.pipMode ? '📺 تم تفعيل شاشة الملتي المصغرة' : '📺 تم إخفاء شاشة الملتي');
            };

            // ============ نظام التبديل (Switching) ============
            window.switchToTab = function(index) {
                if (STATE.activeTab === index) return;

                const prev = STATE.activeTab;
                STATE.activeTab = index;

                const prevFrame = document.getElementById(`game${prev}`);
                const nextFrame = document.getElementById(`game${index}`);

                if (prevFrame) {
                    prevFrame.classList.remove('active');
                    prevFrame.classList.add('inactive');
                    if (STATE.pipMode) prevFrame.classList.add('pip-mode');
                }

                if (nextFrame) {
                    nextFrame.classList.remove('inactive', 'pip-mode');
                    nextFrame.classList.add('active');
                    nextFrame.focus();
                }

                if (!STATE.tabs[index].loaded) {
                    nextFrame.src = STATE.tabs[index].url;
                    STATE.tabs[index].loaded = true;
                    nextFrame.onload = () => injectOptimizations(nextFrame, index);
                }

                document.querySelectorAll('.tab').forEach((tab, i) => tab.classList.toggle('active', i === index));
                document.querySelectorAll('.tab-dot').forEach((dot, i) => dot.classList.toggle('idle', i !== index));
                toast(`🔄 تم التبديل إلى ${index === 0 ? 'الأساسي' : 'الملتي'}`);
            };

            // ============ حقن تقنية الملتي (Multi-box Injection) ============
            function injectOptimizations(frame, tabIndex) {
                try {
                    const doc = frame.contentDocument || frame.contentWindow.document;
                    if (!doc) return;

                    const script = doc.createElement('script');
                    script.textContent = `
                        (function() {
                            window.__tabIndex = ${tabIndex};
                            Object.defineProperty(document, 'hidden', { get: () => false });
                            Object.defineProperty(document, 'visibilityState', { get: () => 'visible' });

                            // إخفاء الإعلانات
                            const s = document.createElement('style');
                            s.textContent = '#bottomAd,#senpa-io_300x250_3,#endGame,#room-stats-hud,#socialsidebar,#preroll,#gameadsbanner-container,#right-panel,#left-panel,.ads-block-1,.banner,.advertisement,.team-players-list,.youtube-box{display:none!important;opacity:0!important;pointer-events:none!important}';
                            document.head.appendChild(s);

                            // مستقبل أوامر الملتي من الشاشة الرئيسية
                            window.addEventListener('message', (e) => {
                                const data = e.data;
                                if (!data) return;

                                const canvas = document.querySelector('canvas');
                                if (!canvas) return;

                                if (data.type === 'multiSummon') {
                                    // محاكاة حركة الماوس نحو إحداثيات اللاعب الأساسي
                                    canvas.dispatchEvent(new MouseEvent('mousemove', { clientX: data.x, clientY: data.y, bubbles: true }));
                                } 
                                else if (data.type === 'multiKey') {
                                    // محاكاة ضغطات الكيبورد (انقسام / إطعام)
                                    window.dispatchEvent(new KeyboardEvent('keydown', { keyCode: data.keyCode, code: data.code, bubbles: true }));
                                    setTimeout(() => {
                                        window.dispatchEvent(new KeyboardEvent('keyup', { keyCode: data.keyCode, code: data.code, bubbles: true }));
                                    }, 50);
                                }
                            });

                            // تخطي شاشة الموت
                            setInterval(() => {
                                const m = document.querySelector('.modal.scale-modal');
                                if (m && (m.style.opacity === '1' || m.classList.contains('active'))) {
                                    document.dispatchEvent(new KeyboardEvent('keydown', { bubbles: true, keyCode: 27, key: 'Escape' }));
                                }
                            }, 100);
                        })();
                    `;
                    doc.head.appendChild(script);
                } catch (e) {
                    console.warn('⚠️ CORS Warning - Injection relies on local wrapper extension context.');
                }
            }

            // ============ إدارة الكيبورد والملتي (Key Handler) ============
            function handleKeyDown(e) {
                if (STATE.rebinding) {
                    e.preventDefault();
                    e.stopPropagation();
                    const code = e.code === 'Space' ? 'Space' : e.code;
                    
                    if (STATE.rebindTarget === 'switch') {
                        CONFIG.switchKey = code;
                        localStorage.setItem('remas_key_switch', code);
                    } else if (STATE.rebindTarget === 'summon') {
                        CONFIG.summonKey = code;
                        localStorage.setItem('remas_key_summon', code);
                    }
                    
                    STATE.rebinding = false;
                    updateKeyButtons();
                    toast(`✅ تم تعيين المفتاح: ${code}`);
                    return;
                }

                // أوامر التبديل
                if (e.code === CONFIG.switchKey && !e.ctrlKey && !e.altKey) {
                    e.preventDefault();
                    switchToTab(STATE.activeTab === 0 ? 1 : 0);
                    return;
                }

                // أوامر الملتي المتقدمة (ترسل للتبويب غير النشط)
                const targetTab = STATE.activeTab === 0 ? 1 : 0;
                const targetFrame = document.getElementById(`game${targetTab}`);
                
                if (!targetFrame || !STATE.tabs[targetTab].loaded) return;

                if (e.code === CONFIG.summonKey) {
                    e.preventDefault();
                    targetFrame.contentWindow.postMessage({ type: 'multiSummon', x: STATE.mouseX, y: STATE.mouseY }, '*');
                } else if (e.code === CONFIG.splitKey) {
                    e.preventDefault();
                    targetFrame.contentWindow.postMessage({ type: 'multiSummon', x: STATE.mouseX, y: STATE.mouseY }, '*'); // توجيه قبل الانقسام
                    targetFrame.contentWindow.postMessage({ type: 'multiKey', keyCode: 32, code: 'Space' }, '*');
                } else if (e.code === CONFIG.feedKey) {
                    e.preventDefault();
                    targetFrame.contentWindow.postMessage({ type: 'multiSummon', x: STATE.mouseX, y: STATE.mouseY }, '*'); // توجيه قبل الإطعام
                    targetFrame.contentWindow.postMessage({ type: 'multiKey', keyCode: 87, code: 'KeyW' }, '*');
                }
            }

            window.startRebind = function(target) {
                STATE.rebinding = true;
                STATE.rebindTarget = target;
                document.getElementById(target === 'switch' ? 'keyBindBtn' : 'summonBindBtn').textContent = '...اضغط';
            };

            function updateKeyButtons() {
                const swBtn = document.getElementById('keyBindBtn');
                const suBtn = document.getElementById('summonBindBtn');
                const hSw = document.getElementById('hintSwitch');
                const hSu = document.getElementById('hintSummon');
                
                if (swBtn) swBtn.textContent = CONFIG.switchKey.replace('Key', '');
                if (suBtn) suBtn.textContent = CONFIG.summonKey.replace('Key', '');
                if (hSw) hSw.textContent = CONFIG.switchKey.replace('Key', '');
                if (hSu) hSu.textContent = CONFIG.summonKey.replace('Key', '');
            }

            // ============ إعدادات التحكم الأخرى ============
            window.toggleLock = function() {
                STATE.lockScreen = !STATE.lockScreen;
                localStorage.setItem('remas_lock', JSON.stringify(STATE.lockScreen));
                document.getElementById('lockToggle')?.classList.toggle('active', STATE.lockScreen);

                if (STATE.lockScreen) {
                    document.getElementById('lockStyles')?.remove();
                    const style = document.createElement('style');
                    style.id = 'lockStyles';
                    style.textContent = `html, body { overscroll-behavior: none !important; overflow: hidden !important; position: fixed !important; width: 100% !important; height: 100% !important; } .games-wrapper { touch-action: none !important; }`;
                    document.head.appendChild(style);
                } else {
                    document.getElementById('lockStyles')?.remove();
                }
                toast(STATE.lockScreen ? '🔒 تم تثبيت الشاشة' : '🔓 تم فك التثبيت');
            };

            window.toggleHideId = function() {
                STATE.hideId = !STATE.hideId;
                localStorage.setItem('remas_hide', JSON.stringify(STATE.hideId));
                document.getElementById('idToggle')?.classList.toggle('active', STATE.hideId);
            };

            function toast(msg) {
                const existing = document.querySelector('.toast');
                if (existing) existing.remove();
                const t = document.createElement('div');
                t.className = 'toast';
                t.textContent = msg;
                document.body.appendChild(t);
                setTimeout(() => t.remove(), 1800);
            }

            // ============ نظام حساب الـ FPS ============
            function initFPS() {
                let frameCount = 0;
                let lastSecond = performance.now();
                function measureFPS(currentTime) {
                    frameCount++;
                    if (currentTime - lastSecond >= 1000) {
                        const fps = Math.round(frameCount / ((currentTime - lastSecond) / 1000));
                        frameCount = 0;
                        lastSecond = currentTime;
                        const fpsEl = document.getElementById('fpsValue');
                        const perfDot = document.getElementById('perfIndicator');
                        if (fpsEl) fpsEl.textContent = fps;
                        if (perfDot) perfDot.className = 'perf-indicator ' + (fps >= 55 ? 'perf-good' : fps >= 35 ? 'perf-medium' : 'perf-bad');
                    }
                    requestAnimationFrame(measureFPS);
                }
                requestAnimationFrame(measureFPS);
            }

            // ============ التهيئة ============
            function init() {
                initFPS();
                document.addEventListener('keydown', handleKeyDown);
                updateKeyButtons();

                document.getElementById('lockToggle')?.classList.toggle('active', STATE.lockScreen);
                document.getElementById('idToggle')?.classList.toggle('active', STATE.hideId);
                document.getElementById('pipToggle')?.classList.toggle('active', STATE.pipMode);
                if (STATE.lockScreen) window.toggleLock(); window.toggleLock(); // تحديث قفل الشاشة

                // تحميل اللعبة الأساسية
                const frame0 = document.getElementById('game0');
                if (frame0) frame0.onload = () => injectOptimizations(frame0, 0);
                
                // تحميل الملتي في الخلفية ليكون جاهز للاستدعاء
                const frame1 = document.getElementById('game1');
                if (frame1 && !STATE.tabs[1].loaded) {
                    frame1.src = STATE.tabs[1].url;
                    STATE.tabs[1].loaded = true;
                    frame1.onload = () => injectOptimizations(frame1, 1);
                    if (STATE.pipMode && STATE.activeTab === 0) frame1.classList.add('pip-mode');
                }
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
</body>
</html>
