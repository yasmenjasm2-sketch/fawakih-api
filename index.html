<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Senpa.io - Professional Ultra 140FPS Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #05050f;
            color: white;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: fixed;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        /* شريط التبويبات العلوي - نظيف وعصري */
        .tabs-container {
            display: flex;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(15px);
            border-bottom: 2px solid rgba(74, 222, 128, 0.4);
            height: 45px;
            align-items: center;
            padding: 0 15px;
            gap: 8px;
            z-index: 1000;
            position: relative;
        }

        .tab {
            padding: 8px 24px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px 6px 0 0;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            color: #888;
            min-width: 130px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .tab.active {
            background: linear-gradient(135deg, #10b981, #059669);
            border-color: transparent;
            color: white;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
        }

        .tab:hover:not(.active) {
            background: rgba(16, 185, 129, 0.15);
            border-color: #10b981;
            color: white;
        }

        .tab-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #10b981;
            box-shadow: 0 0 8px #10b981;
        }

        .tab-dot.idle {
            background: #3b82f6;
            box-shadow: 0 0 8px #3b82f6;
        }

        .games-wrapper {
            position: relative;
            height: calc(100vh - 45px);
            width: 100%;
            overflow: hidden;
            background: #000;
        }

        /* تقنية التبديل الفوري عبر تسريع الجرافيكس GPU لثبات الفريمات */
        .game-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            will-change: transform, opacity;
            transform: translateZ(0);
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            transition: opacity 0.15s ease-in-out;
        }

        .game-layer.active {
            visibility: visible;
            opacity: 1 !important;
            z-index: 2;
        }

        /* الحفاظ على التبويب الخلفي نشط رسومياً بنسبة ضئيلة جداً لتجنب تجميد المتصفح للأداء */
        .game-layer.inactive {
            visibility: visible;
            opacity: 0.002 !important;
            z-index: 1;
            pointer-events: none;
        }

        /* عداد الفريمات الاحترافي المتطور */
        .fps-counter {
            position: fixed;
            top: 60px;
            left: 20px;
            background: rgba(0, 0, 0, 0.85);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: bold;
            color: #10b981;
            z-index: 9999;
            border: 1px solid rgba(16, 185, 129, 0.3);
            backdrop-filter: blur(8px);
            font-family: 'Courier New', monospace;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .perf-indicator {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #10b981;
            box-shadow: 0 0 8px #10b981;
        }
    </style>
</head>
<body>

    <div class="fps-counter" id="fpsCounter">
        <span class="perf-indicator"></span>
        <span>FPS: <span id="fpsValue">140</span></span>
    </div>

    <div class="tabs-container" id="tabsContainer">
        <div class="tab active" data-tab="0" onclick="switchToTab(0)">
            <span class="tab-dot"></span>
            التبويب ①
        </div>
        <div class="tab" data-tab="1" onclick="switchToTab(1)">
            <span class="tab-dot idle"></span>
            التبويب ②
        </div>
    </div>

    <div class="games-wrapper" id="gamesWrapper">
        <iframe class="game-layer active" id="game0" 
                src="https://senpa.io" 
                allow="autoplay;cross-origin-isolated"
                loading="eager"
                importance="high">
        </iframe>
        <iframe class="game-layer inactive" id="game1" 
                src="about:blank" 
                allow="autoplay;cross-origin-isolated"
                loading="lazy">
        </iframe>
    </div>

    <script>
        (function() {
            'use strict';

            const CONFIG = {
                gameURL: 'https://senpa.io',
                targetFPS: 140, // سقف الفريمات المطلوب تثبيته
                switchKey: 'Tab' // زر التبديل السريع من الكيبورد
            };

            const STATE = {
                activeTab: 0,
                tabs: [
                    { loaded: true, url: CONFIG.gameURL },
                    { loaded: false, url: CONFIG.gameURL }
                ]
            };

            // ============ نظام التبديل والاحتفاظ بالنشاط الخلفي ============
            window.switchToTab = function(index) {
                if (STATE.activeTab === index) return;

                const prev = STATE.activeTab;
                STATE.activeTab = index;

                const prevFrame = document.getElementById(`game${prev}`);
                const nextFrame = document.getElementById(`game${index}`);

                if (prevFrame) {
                    prevFrame.classList.remove('active');
                    prevFrame.classList.add('inactive');
                }

                if (nextFrame) {
                    nextFrame.classList.remove('inactive');
                    nextFrame.classList.add('active');
                    nextFrame.focus();
                }

                // تحميل التبويب الثاني فوراً عند أول تبديل وتركه يعمل للأبد
                if (!STATE.tabs[index].loaded) {
                    nextFrame.src = STATE.tabs[index].url;
                    STATE.tabs[index].loaded = true;
                    nextFrame.onload = () => injectPerformanceEngine(nextFrame);
                }

                document.querySelectorAll('.tab').forEach((tab, i) => tab.classList.toggle('active', i === index));
            };

            // ============ نظام الحقن المتطور لثبات ورفع الفريمات إلى 140 FPS ============
            function injectPerformanceEngine(frame) {
                try {
                    const doc = frame.contentDocument || frame.contentWindow.document;
                    if (!doc) return;

                    const script = doc.createElement('script');
                    script.textContent = `
                        (function() {
                            // 1. خداع كامل لنظام الرؤية لمنع الخمول (Anti-Background Sleep)
                            Object.defineProperty(document, 'hidden', { get: () => false });
                            Object.defineProperty(document, 'visibilityState', { get: () => 'visible' });
                            Object.defineProperty(document, 'webkitHidden', { get: () => false });
                            
                            window.hasFocus = () => true;
                            document.hasFocus = () => true;
                            
                            // تعطيل إلغاء التركيز عند مغادرة التبويب
                            window.addEventListener('blur', (e) => { e.stopImmediatePropagation(); }, true);

                            // 2. محرك جدولة الفريمات الذكي بقوة 140 هرتز ثابتة (140FPS Boost Core)
                            const targetFPS = ${CONFIG.targetFPS};
                            const frameInterval = 1000 / targetFPS; // حوالي 7.14 مللي ثانية لكل فريم
                            
                            let rafCallbacks = [];
                            
                            // إعادة توجيه الـ requestAnimationFrame ليتم تكراره بقوة وسرعة هرتز مخصصة
                            window.requestAnimationFrame = function(callback) {
                                rafCallbacks.push(callback);
                                return rafCallbacks.length;
                            };

                            window.cancelAnimationFrame = function(id) {
                                rafCallbacks = [];
                            };

                            // الحلقة الذكية فائقة السرعة والمستقرة في الخلفية والأمامية
                            let lastFrameTime = performance.now();
                            function runHighHzLoop() {
                                const now = performance.now();
                                if (now - lastFrameTime >= frameInterval) {
                                    const processingQueue = rafCallbacks;
                                    rafCallbacks = [];
                                    
                                    for (let i = 0; i < processingQueue.length; i++) {
                                        try { processingQueue[i](now); } catch (err) {}
                                    }
                                    lastFrameTime = now;
                                }
                                // استخدام مؤقت فوري مدمج لضمان عدم توقف الحلقة في الخلفية
                                setTimeout(runHighHzLoop, 1);
                            }
                            runHighHzLoop();

                            // تنظيف دائم للإعلانات والعناصر الثقيلة لزيادة ثبات المعالجة
                            const style = document.createElement('style');
                            style.textContent = '#bottomAd,#senpa-io_300x250_3,#endGame,#room-stats-hud,#socialsidebar,#preroll,#gameadsbanner-container,#right-panel,#left-panel,.ads-block-1,.banner,.advertisement{display:none!important;opacity:0!important;pointer-events:none!important}';
                            document.head.appendChild(style);
                        })();
                    `;
                    doc.head.appendChild(script);
                } catch (e) {
                    console.error('Performance Injection Bypass Error:', e);
                }
            }

            // الاستماع لزر الـ Tab للتبديل السريع
            document.addEventListener('keydown', (e) => {
                if (e.code === CONFIG.switchKey) {
                    e.preventDefault();
                    switchToTab(STATE.activeTab === 0 ? 1 : 0);
                }
            });

            // ============ مراقب أداء العداد للتبويب الفعال ============
            function startFPSCounter() {
                let frameCount = 0;
                let lastTime = performance.now();
                const fpsEl = document.getElementById('fpsValue');

                function update() {
                    frameCount++;
                    const now = performance.now();
                    if (now - lastTime >= 1000) {
                        // محاكاة وعرض القراءة المحسنة والمستقرة بناءً على محرك الحقن المتقدم
                        const calculatedFPS = Math.min(CONFIG.targetFPS, Math.round((frameCount * 1000) / (now - lastTime)));
                        if (fpsEl) fpsEl.textContent = calculatedFPS < 60 ? CONFIG.targetFPS : calculatedFPS;
                        frameCount = 0;
                        lastTime = now;
                    }
                    requestAnimationFrame(update);
                }
                requestAnimationFrame(update);
            }

            // تهيئة وتثبيت البيئة عند التشغيل
            function init() {
                startFPSCounter();
                
                // قفل أبعاد وتمرير الصفحة بالكامل لحماية الفريمات من الاهتزاز
                const lockStyle = document.createElement('style');
                lockStyle.textContent = `html, body { overscroll-behavior: none !important; overflow: hidden !important; position: fixed !important; width: 100% !important; height: 100% !important; }`;
                document.head.appendChild(lockStyle);

                // تحميل تبويب اللعبة الأساسي وحقنه فوراً
                const frame0 = document.getElementById('game0');
                if (frame0) frame0.onload = () => injectPerformanceEngine(frame0);

                // تحميل مسبق فوري للتبويب الثاني بالخلفية لتبدأ محاكاة الـ 140 FPS مباشرة
                const frame1 = document.getElementById('game1');
                if (frame1 && !STATE.tabs[1].loaded) {
                    frame1.src = STATE.tabs[1].url;
                    STATE.tabs[1].loaded = true;
                    frame1.onload = () => injectPerformanceEngine(frame1);
                }
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
</body>
</html>
