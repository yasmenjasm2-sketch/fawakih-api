<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, minimal-ui">
    <title>Senpa.io - 140 FPS Stable | Remas Ultimate</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100vw;
            height: 100vh;
            overflow: hidden !important;
            position: fixed !important;
            background: #000;
            touch-action: none !important;
            overscroll-behavior: none !important;
            -webkit-touch-callout: none !important;
            -webkit-user-select: none !important;
            user-select: none !important;
            -webkit-tap-highlight-color: transparent;
        }

        /* حاوية اللعبة تمتد على كامل الشاشة 100% */
        .games-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
            z-index: 1;
        }

        .game-frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            will-change: transform;
            transform: translateZ(0);
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        /* عداد FPS - لا يعيق اللمس */
        .fps-display {
            position: fixed;
            bottom: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            z-index: 9999;
            border: 1px solid rgba(74, 222, 128, 0.4);
            font-family: 'Courier New', monospace;
            color: #4ade80;
            display: flex;
            align-items: center;
            gap: 8px;
            pointer-events: none;
        }

        .fps-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ade80;
            box-shadow: 0 0 10px #4ade80;
        }

        .fps-dot.warning {
            background: #fbbf24;
            box-shadow: 0 0 10px #fbbf24;
        }

        .fps-dot.danger {
            background: #ef4444;
            box-shadow: 0 0 10px #ef4444;
        }
    </style>
</head>
<body>

    <div class="games-container">
        <iframe class="game-frame" id="mainGame" 
                src="https://senpa.io" 
                allow="camera;microphone;autoplay;clipboard-read;clipboard-write"
                loading="eager">
        </iframe>
    </div>

    <div class="fps-display">
        <span class="fps-dot" id="fpsDot"></span>
        <span id="fpsValue">140</span> FPS
    </div>

    <script>
        (function() {
            'use strict';

            const TARGET_FPS = 140;

            // ============ 1. تثبيت إيماءات الشاشة (دعم إضافي للسكربت) ============
            document.addEventListener('touchmove', function(event) {
                if (event.scale !== 1) { event.preventDefault(); }
            }, { passive: false });

            document.addEventListener('gesturestart', function(e) {
                e.preventDefault();
            });

            let lastTouchEnd = 0;
            document.addEventListener('touchend', function(event) {
                let now = (new Date()).getTime();
                if (now - lastTouchEnd <= 300) { event.preventDefault(); }
                lastTouchEnd = now;
            }, false);

            // ============ 2. نظام منع التجميد المطور (Anti-Freeze) ============
            function initAntiFreeze() {
                // خداع المتصفح لإبقاء الصفحة مرئية ونشطة
                const overrideVisibility = () => {
                    try {
                        Object.defineProperty(document, 'hidden', { get: () => false, configurable: true });
                        Object.defineProperty(document, 'visibilityState', { get: () => 'visible', configurable: true });
                        Object.defineProperty(document, 'webkitHidden', { get: () => false, configurable: true });
                        Object.defineProperty(document, 'webkitVisibilityState', { get: () => 'visible', configurable: true });
                    } catch (e) {}
                };
                overrideVisibility();
                setInterval(overrideVisibility, 500);

                // حظر أحداث التجميد
                const blockFreezeEvents = (e) => {
                    e.stopImmediatePropagation();
                    e.stopPropagation();
                };
                ['visibilitychange', 'pagehide', 'freeze', 'blur'].forEach(evt => {
                    window.addEventListener(evt, blockFreezeEvents, true);
                    document.addEventListener(evt, blockFreezeEvents, true);
                });

                // Web Worker للنبض المستمر ومنع خمول المتصفح
                const workerBlob = new Blob([`
                    let running = true;
                    self.onmessage = (e) => { if (e.data === 'stop') running = false; };
                    function pulse() {
                        if (!running) return;
                        self.postMessage('beat');
                        setTimeout(pulse, 50);
                    }
                    pulse();
                `], { type: 'application/javascript' });
                
                const worker = new Worker(URL.createObjectURL(workerBlob));
                worker.onmessage = () => {
                    // نبض خفيف للحفاظ على استقرار المعالج
                };

                // إرسال رسائل مستمرة للـ iframe لمنعه من الدخول في وضع السكون
                setInterval(() => {
                    const frame = document.getElementById('mainGame');
                    if (frame && frame.contentWindow) {
                        try {
                            frame.contentWindow.postMessage({ type: 'keepAlive' }, '*');
                        } catch (e) {}
                    }
                }, 2000);
            }

            // ============ 3. نظام حساب الفريمات ============
            function initFPS() {
                let frameCount = 0;
                let lastTime = performance.now();
                let fps = TARGET_FPS;
                const fpsValue = document.getElementById('fpsValue');
                const fpsDot = document.getElementById('fpsDot');

                function loop(currentTime) {
                    frameCount++;
                    
                    if (currentTime - lastTime >= 1000) {
                        fps = Math.round(frameCount / ((currentTime - lastTime) / 1000));
                        frameCount = 0;
                        lastTime = currentTime;

                        if (fpsValue) fpsValue.textContent = fps;
                        if (fpsDot) {
                            fpsDot.className = 'fps-dot ' + (
                                fps >= 130 ? '' :
                                fps >= 90 ? 'warning' : 'danger'
                            );
                        }
                    }

                    requestAnimationFrame(loop);
                }

                requestAnimationFrame(loop);
            }

            // ============ التهيئة الرئيسية ============
            function init() {
                console.log('🚀 Single-Frame Mode Activated');
                initAntiFreeze();
                initFPS();
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
</body>
</html>
