<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Senpa.io - Ultimate Edition | ريماس التيم</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: fixed;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        /* شريط التبويبات العلوي */
        .tabs-container {
            display: flex;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid rgba(102, 126, 234, 0.5);
            height: 45px;
            align-items: center;
            padding: 0 10px;
            gap: 5px;
            z-index: 1000;
            position: relative;
        }

        .tab {
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            transition: all 0.3s ease;
            color: #ccc;
            white-space: nowrap;
            min-width: 120px;
            text-align: center;
        }

        .tab.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-color: #667eea;
            color: white;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.5);
            transform: translateY(-2px);
        }

        .tab:hover:not(.active) {
            background: rgba(255, 255, 255, 0.2);
            border-color: #667eea;
            transform: translateY(-1px);
        }

        .tab-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ade80;
            display: inline-block;
            margin-left: 8px;
            box-shadow: 0 0 10px #4ade80;
        }

        .tab-indicator.inactive {
            background: #ef4444;
            box-shadow: 0 0 10px #ef4444;
        }

        /* حاوية الألعاب المحسنة بكرت الشاشة */
        .games-wrapper {
            position: relative;
            height: calc(100vh - 45px);
            width: 100%;
            overflow: hidden;
            background: #000;
        }

        .game-frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            will-change: transform, opacity;
            transform: translate3d(0, 0, 0); /* إجبار كرت الشاشة على تسريع الرندر ثنائي الأبعاد */
            backface-visibility: hidden;
            transition: opacity 0.15s linear; /* تبديل فوري لعدم ضياع الإطارات */
        }

        /* تحسين ذكي: التبويب النشط يظهر بالكامل */
        .game-frame.active {
            opacity: 1 !important;
            pointer-events: all !important;
            z-index: 10;
        }

        /* التبويب الخلفي يظل شفافاً جداً بدلاً من الاختفاء تماماً لإجبار المتصفح على معالجته واستقراره على 60 فريم */
        .game-frame.background {
            opacity: 0.005 !important;
            pointer-events: none !important;
            z-index: 1;
        }

        /* لوحة التحكم */
        .control-panel {
            position: fixed;
            top: 55px;
            right: 20px;
            background: rgba(10, 10, 20, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            min-width: 250px;
            z-index: 9999;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .panel-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0;
            padding: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
        }

        .btn-instagram {
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            color: white;
            margin-top: 15px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .fps-counter {
            position: fixed;
            top: 55px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            color: #4ade80;
            z-index: 9999;
            border: 1px solid rgba(74, 222, 128, 0.3);
        }

        .key-bind-indicator {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 12px;
            color: #ccc;
            z-index: 9999;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(102, 126, 234, 0.9);
            color: white;
            padding: 10px 25px;
            border-radius: 25px;
            font-size: 13px;
            font-weight: bold;
            z-index: 10000;
            animation: fadeInOut 2s ease;
            pointer-events: none;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            20% { opacity: 1; transform: translateX(-50%) translateY(0); }
            80% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
        }

        .hidden {
            display: none !important;
        }

        .toggle-switch {
            position: relative;
            width: 50px;
            height: 26px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 13px;
            cursor: pointer;
            transition: 0.3s;
        }

        .toggle-switch.active {
            background: #667eea;
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 22px;
            height: 22px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: 0.3s;
        }

        .toggle-switch.active::after {
            left: 26px;
        }

        .instagram-svg {
            width: 18px;
            height: 18px;
            fill: white;
        }
    </style>
</head>
<body>

    <!-- عداد FPS -->
    <div class="fps-counter" id="fpsCounter">FPS: 60</div>

    <!-- شريط التبويبات -->
    <div class="tabs-container" id="tabsContainer">
        <div class="tab active" data-tab="0" onclick="switchTab(0)">
            اللعبة 1 <span class="tab-indicator"></span>
        </div>
        <div class="tab" data-tab="1" onclick="switchTab(1)">
            اللعبة 2 <span class="tab-indicator inactive"></span>
        </div>
    </div>

    <!-- حاوية الألعاب الاستقراية القصوى -->
    <div class="games-wrapper" id="gamesWrapper">
        <iframe class="game-frame active" id="gameFrame0" src="about:blank" allow="camera;microphone;autoplay"></iframe>
        <iframe class="game-frame background" id="gameFrame1" src="about:blank" allow="camera;microphone;autoplay"></iframe>
    </div>

    <!-- لوحة التحكم -->
    <div class="control-panel" id="controlPanel">
        <div class="panel-title">⚡ ريماس التيم - الإعدادات المتقدمة</div>
        
        <div class="setting-row">
            <span>إظهار زر الانستغرام</span>
            <div class="toggle-switch active" id="instagramToggle" onclick="toggleInstagram()"></div>
        </div>
        
        <div class="setting-row">
            <span>إخفاء معرف اللاعب</span>
            <div class="toggle-switch active" id="hideIdToggle" onclick="toggleHideId()"></div>
        </div>
        
        <div class="setting-row">
            <span>مفتاح التبديل الحالي</span>
            <button class="btn btn-primary" id="keyBindBtn" onclick="rebindKey()">Tab</button>
        </div>

        <div class="setting-row">
            <span>تثبيت الشاشة</span>
            <div class="toggle-switch active" id="lockScreenToggle" onclick="toggleScreenLock()"></div>
        </div>

        <button class="btn btn-instagram" onclick="openInstagram()">
            <svg class="instagram-svg" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>
            </svg>
            Instagram
        </button>
    </div>

    <!-- مؤشر المفتاح -->
    <div class="key-bind-indicator">
        اضغط <strong id="currentKey">Tab</strong> للتبديل الفوري بين التبويبات
    </div>

    <script>
        // ============ الإعدادات والتكوين ============
        const CONFIG = {
            gameURL: 'https://senpa.io',
            instagramLink: 'https://www.instagram.com/6i99n?igsh=MW1wMTNpamJpMWNxeg==',
            maxTabs: 2,
            defaultKey: 'Tab'
        };

        // ============ الحالة العامة ============
        let state = {
            activeTab: 0,
            isRebinding: false,
            switchKey: localStorage.getItem('remas_switch_key') || CONFIG.defaultKey,
            showInstagram: JSON.parse(localStorage.getItem('remas_instagram') || 'true'),
            hideId: JSON.parse(localStorage.getItem('remas_hide_id') || 'true'),
            screenLocked: JSON.parse(localStorage.getItem('remas_screen_lock') || 'true'),
            tabs: [
                { id: 'tab_0', loaded: false },
                { id: 'tab_1', loaded: false }
            ],
            fps: 60,
            lastFrameTime: performance.now()
        };

        // ============ 1. محرك نبضات الخلفية المتطور (Ultimate Booster) ============
        function initAntiThrottlingEngine() {
            // خداع كامل لخصائص الرؤية داخل الصفحة الرئيسية لمنع المتصفح من تقليل الجهد
            Object.defineProperty(document, 'hidden', { get: () => false, configurable: true });
            Object.defineProperty(document, 'visibilityState', { get: () => 'visible', configurable: true });
            Object.defineProperty(document, 'webkitHidden', { get: () => false, configurable: true });

            // حظر أحداث السبات والخروج القسري
            ['visibilitychange', 'blur', 'focusout', 'pagehide'].forEach(evt => {
                window.addEventListener(evt, (e) => { e.stopImmediatePropagation(); e.stopPropagation(); }, true);
                document.addEventListener(evt, (e) => { e.stopImmediatePropagation(); e.stopPropagation(); }, true);
            });

            // بناء خادم نبضات منفصل (Web Worker) يرسل إشارات مكثفة كل 2 ملي ثانية لمنع نوم التبويبات
            try {
                const workerCode = `
                    setInterval(() => {
                        self.postMessage('pulse');
                    }, 2);
                `;
                const blob = new Blob([workerCode], { type: 'application/javascript' });
                const worker = new Worker(URL.createObjectURL(blob));
                worker.onmessage = function() {
                    // استدعاء رندر خفيف يحافظ على نشاط المتصفح بأقصى طاقة
                    window.dispatchEvent(new CustomEvent('remas-keepalive'));
                };
            } catch (e) {
                console.log("Web Worker standby fallback active.");
            }

            // نظام تفعيل طاقة الرسوميات القصوى للهاردوير
            if (window.WebGLRenderingContext) {
                const getCtx = HTMLCanvasElement.prototype.getContext;
                HTMLCanvasElement.prototype.getContext = function(type, attribs) {
                    if (type === 'webgl' || type === 'webgl2') {
                        attribs = attribs || {};
                        attribs.powerPreference = 'high-performance'; // طلب الأداء الأقصى لكرت الشاشة
                        attribs.desynchronized = true; // إلغاء المزامنة العمودية لتقليل الـ Lag
                    }
                    return getCtx.call(this, type, attribs);
                };
            }
        }

        // ============ 2. قفل الوسائط الصوتي لمنع السبات (Audio Wake Lock) ============
        let audioWakeContext = null;
        function activateAudioWakeLock() {
            if (audioWakeContext) return;
            try {
                const AudioCtx = window.AudioContext || window.webkitAudioContext;
                audioWakeContext = new AudioCtx();
                
                // إنشاء عازل صوتي صامت مستمر يجعل المتصفح يعتبر التبويب بأكمله نشطاً صوتياً 
                const buffer = audioWakeContext.createBuffer(1, 1, 22050);
                const source = audioWakeContext.createBufferSource();
                source.buffer = buffer;
                source.loop = true;
                source.connect(audioWakeContext.destination);
                source.start();
                console.log('🔊 تم تشغيل الـ Audio Wake Lock لمنع سقوط الإطارات بالخلفية');
            } catch (e) {
                console.error("Audio Context boost failed:", e);
            }
        }
        // تفعيل القفل الصوتي فور أول تفاعل للمستخدم (شرط أساسي لسياسة المتصفح)
        window.addEventListener('click', activateAudioWakeLock, { once: true });
        window.addEventListener('keydown', activateAudioWakeLock, { once: true });

        // ============ نظام حساب الـ FPS دقيق ومباشر ============
        function initFPSCounter() {
            let frames = 0;
            let lastLog = performance.now();
            
            function fpsLoop() {
                frames++;
                const now = performance.now();
                if (now >= lastLog + 1000) {
                    state.fps = Math.round((frames * 1000) / (now - lastLog));
                    const el = document.getElementById('fpsCounter');
                    if (el) {
                        el.textContent = `FPS: ${state.fps}`;
                        el.style.color = state.fps >= 55 ? '#4ade80' : (state.fps >= 35 ? '#fbbf24' : '#ef4444');
                    }
                    frames = 0;
                    lastLog = now;
                }
                requestAnimationFrame(fpsLoop);
            }
            requestAnimationFrame(fpsLoop);
        }

        // ============ نظام قفل الشاشة المطور ============
        function lockScreen() {
            if (!state.screenLocked) return;
            document.addEventListener('touchmove', (e) => { if (e.scale !== 1) e.preventDefault(); }, { passive: false });
            document.addEventListener('gesturestart', (e) => e.preventDefault());
            let lastTouch = 0;
            document.addEventListener('touchend', (e) => {
                const now = Date.now();
                if (now - lastTouch <= 300) e.preventDefault();
                lastTouch = now;
            }, false);

            if (!document.getElementById('screenStyles')) {
                const style = document.createElement('style');
                style.id = 'screenStyles';
                style.textContent = `html,body{touch-action:none!important;overscroll-behavior:none!important;overflow:hidden!important;position:fixed!important;width:100%!important;height:100%!important;}`;
                document.head.appendChild(style);
            }
        }

        function toggleScreenLock() {
            state.screenLocked = !state.screenLocked;
            localStorage.setItem('remas_screen_lock', JSON.stringify(state.screenLocked));
            document.getElementById('lockScreenToggle').classList.toggle('active', state.screenLocked);
            if (state.screenLocked) lockScreen(); else { const st = document.getElementById('screenStyles'); if(st) st.remove(); }
            showToast(state.screenLocked ? 'تم تفعيل تثبيت الشاشة' : 'تم إلغاء تثبيت الشاشة');
        }

        // ============ محرك التبديل الفوري الصامت (Instant Switcher) ============
        function switchTab(index) {
            if (state.activeTab === index) return;
            state.activeTab = index;
            
            const frames = document.querySelectorAll('.game-frame');
            const tabs = document.querySelectorAll('.tab');
            
            // تبديل الفئات بدقة متناهية مع الحفاظ على التبويب الآخر يعمل بنسبة شفافية ضئيلة جداً لكرت الشاشة
            frames.forEach((frame, i) => {
                if (i === index) {
                    frame.classList.remove('background');
                    frame.classList.add('active');
                    frame.focus();
                } else {
                    frame.classList.remove('active');
                    frame.classList.add('background');
                }
            });
            
            tabs.forEach((tab, i) => {
                const ind = tab.querySelector('.tab-indicator');
                if (i === index) {
                    tab.classList.add('active');
                    if (ind) ind.classList.remove('inactive');
                } else {
                    tab.classList.remove('active');
                    if (ind) ind.classList.add('inactive');
                }
            });
            
            if (!state.tabs[index].loaded) {
                loadGame(index);
            }
            showToast(`تم التبديل إلى التبويب ${index + 1}`);
        }

        function loadGame(index) {
            const frame = document.getElementById(`gameFrame${index}`);
            if (frame && !state.tabs[index].loaded) {
                frame.src = CONFIG.gameURL;
                state.tabs[index].loaded = true;
            }
        }

        // ============ إدارة المدخلات واختصارات الكيبورد ============
        function handleKeyPress(e) {
            if (state.isRebinding) {
                e.preventDefault();
                e.stopPropagation();
                state.switchKey = e.code;
                localStorage.setItem('remas_switch_key', e.code);
                document.getElementById('currentKey').textContent = e.code;
                state.isRebinding = false;
                updateKeyBindButton();
                showToast(`تم التعيين: ${e.code}`);
                return;
            }
            
            if (e.code === state.switchKey && !e.ctrlKey && !e.altKey && !e.metaKey) {
                e.preventDefault();
                switchTab((state.activeTab + 1) % CONFIG.maxTabs);
            }
        }

        function rebindKey() {
            state.isRebinding = true;
            document.getElementById('keyBindBtn').textContent = 'اضغط أي مفتاح...';
            showToast('في انتظار ضغط المفتاح الجديد...');
        }

        function updateKeyBindButton() {
            document.getElementById('keyBindBtn').textContent = state.switchKey;
        }

        // ============ واجهة المستخدم والتحسينات ============
        function toggleInstagram() {
            state.showInstagram = !state.showInstagram;
            localStorage.setItem('remas_instagram', JSON.stringify(state.showInstagram));
            document.getElementById('instagramToggle').classList.toggle('active', state.showInstagram);
            showToast(state.showInstagram ? 'تم تفعيل زر انستغرام' : 'تم إخفاء زر انستغرام');
        }

        function toggleHideId() {
            state.hideId = !state.hideId;
            localStorage.setItem('remas_hide_id', JSON.stringify(state.hideId));
            document.getElementById('hideIdToggle').classList.toggle('active', state.hideId);
            showToast(state.hideId ? 'تم تفعيل إخفاء الهوية' : 'تم إلغاء إخفاء الهوية');
        }

        function openInstagram() { window.open(CONFIG.instagramLink, '_blank'); }

        function showToast(msg) {
            const old = document.querySelector('.toast'); if (old) old.remove();
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 1800);
        }

        // ============ تهيئة تشغيل النظام بالكامل ============
        function initialize() {
            initAntiThrottlingEngine();
            lockScreen();
            initFPSCounter();
            loadGame(0); // تحميل التبويب الأول فوراً
            loadGame(1); // تحميل التبويب الثاني مسبقاً بالخلفية ليكون جاهزاً فوراً عند التبديل
            
            document.addEventListener('keydown', handleKeyPress);
            updateKeyBindButton();
            
            // إخفاء الإعلانات من الجذر الخارجي والداخلي المتوقع
            const style = document.createElement('style');
            style.textContent = `#bottomAd,#senpa-io_300x250_3,#endGame,#room-stats-hud,#socialsidebar,#preroll,#gameadsbanner-container,#right-panel,#left-panel,.ads-block-1,.banner,.advertisement,.team-players-list,.youtube-box{display:none!important;opacity:0!important;pointer-events:none!important;height:0!important;width:0!important;}`;
            document.head.appendChild(style);
        }

        window.addEventListener('load', initialize);
        window.addEventListener('error', (e) => e.preventDefault());
    </script>
</body>
</html>
